{% extends "_base.html" %}

{% block title %}Log Out{% endblock %}

{% block content %}

<h1>Log Out</h1>

<p>Are you sure you want to log out?</p>

<form method="post" action="{% url 'logout_confirm' %}">
    {% csrf_token %}

    <button class="btn btn-danger" type="submit">
        Log Out
    </button>
</form>

{% endblock content %}
